<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloodDiffusion Network Client</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: #ffffff; padding: 40px; max-width: 800px; margin: 0 auto; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; }
        input[type="text"] { width: 70%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .metrics { display: flex; gap: 20px; margin-top: 20px; font-family: monospace; color: #4caf50; }
        pre { background: #000; padding: 15px; border-radius: 4px; overflow-x: auto; font-size: 12px; color: #00ff00; height: 300px;}
    </style>
</head>
<body>
    <h1>FloodDiffusion: Streaming Edge Client</h1>
    
    <div class="card">
        <h3>Generate Motion Payload</h3>
        <input type="text" id="promptInput" value="A person waving their hand" />
        <button onclick="sendRequest()">Send HTTP POST</button>
        
        <div class="metrics" id="metricsPanel" style="display: none;">
            <div id="latency">Round-Trip Latency: -- ms</div>
            <div id="payloadSize">Payload Size: -- KB</div>
            <div id="frames">Frames Received: --</div>
        </div>
    </div>

    <div class="card">
        <h3>Network Payload (JSON 3D Coordinates)</h3>
        <pre id="jsonOutput">Waiting for network traffic...</pre>
    </div>

    <script>
        async function sendRequest() {
            const prompt = document.getElementById('promptInput').value;
            const output = document.getElementById('jsonOutput');
            const metrics = document.getElementById('metricsPanel');
            
            output.textContent = "Transmitting packet to Edge Server...\nProcessing inference on M1 GPU...";
            metrics.style.display = "none";

            const startTime = performance.now();

            try {
                // Change this to your ngrok URL later!
                const response = await fetch('https://immodestly-tenacious-kraig.ngrok-free.dev/api/generate_stream', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: prompt })
                });

                const data = await response.json();
                const endTime = performance.now();
                
                // Calculate Network Metrics
                const roundTripTime = (endTime - startTime).toFixed(2);
                const jsonString = JSON.stringify(data, null, 2);
                const kbSize = (new Blob([jsonString]).size / 1024).toFixed(2);

                // Update UI
                document.getElementById('latency').textContent = `Round-Trip Latency: ${roundTripTime} ms`;
                document.getElementById('payloadSize').textContent = `Payload Size: ${kbSize} KB`;
                document.getElementById('frames').textContent = `Frames: ${data.tensor_shape[0]}`;
                output.textContent = jsonString;
                metrics.style.display = "flex";

            } catch (error) {
                output.textContent = "Network Error: " + error.message;
            }
        }
    </script>
</body>
</html>
